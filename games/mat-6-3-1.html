<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAT 6.3.1 - Açı Casusları</title>
  
  <!-- Tailwind CSS & Fonts (Works online with fallback to inline styling offline) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;750;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #020617;
      color: #f1f5f9;
      user-select: none;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #020617;
    }
    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #334155;
    }

    /* Robust Offline CSS Fallbacks for layouts if Tailwind fails to load offline */
    .offline-grid-hud {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    @media (max-width: 640px) {
      .offline-grid-hud {
        grid-template-columns: 1fr;
      }
    }
    .offline-card {
      background-color: rgb(15 23 42 / 0.4);
      border: 1px solid rgb(30 41 59);
      border-radius: 12px;
      padding: 12px;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between overflow-x-hidden p-0 m-0">

  <div id="app" class="max-w-7xl mx-auto px-4 md:px-6 py-4 flex-1 flex flex-col justify-between">
    <!-- Dynamic Content Rendered Here -->
  </div>

  <script>
    // ----------------- APP STATE ENGINE -----------------
    const state = {
      view: 'missions', // 'missions' or 'lab'
      stats: {
        score: 0,
        energyCrystals: 0,
        rank: "Çaylak Casus",
        completedMissions: 0,
        unlockedLevels: [1]
      },
      activeMissionId: null,
      focusedAngleId: 1,
      transversalAngle: 65,
      lineDistance: 130,
      selectedAngleId: null,
      highlightedAngleIds: [],
      correctPairIds: [],
      foundPairsList: [],
      m4Index: 0,
      m5Index: 0,
      m6StepIdx: 0,
      feedback: { status: 'idle', text: '' },
      hintOpen: false,
      notifications: []
    };

    // ----------------- SOUND SYSTEM (Web Audio Synthesizer) -----------------
    const audioContextRef = { current: null };
    function getAudioContext() {
      if (!audioContextRef.current) {
        audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioContextRef.current;
    }

    const playSound = {
      clickAngle: () => {
        try {
          const ctx = getAudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(580, ctx.currentTime);
          gain.gain.setValueAtTime(0.08, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
          osc.start();
          osc.stop(ctx.currentTime + 0.12);
        } catch(e) {}
      },
      clickButton: () => {
        try {
          const ctx = getAudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(420, ctx.currentTime);
          gain.gain.setValueAtTime(0.1, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
          osc.start();
          osc.stop(ctx.currentTime + 0.1);
        } catch(e) {}
      },
      success: () => {
        try {
          const ctx = getAudioContext();
          const now = ctx.currentTime;
          
          const osc1 = ctx.createOscillator();
          const gain1 = ctx.createGain();
          osc1.connect(gain1); gain1.connect(ctx.destination);
          osc1.frequency.setValueAtTime(523.25, now);
          gain1.gain.setValueAtTime(0.08, now);
          gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
          osc1.start(); osc1.stop(now + 0.15);

          setTimeout(() => {
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.connect(gain2); gain2.connect(ctx.destination);
            osc2.frequency.setValueAtTime(659.25, ctx.currentTime);
            gain2.gain.setValueAtTime(0.08, ctx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
            osc2.start(); osc2.stop(ctx.currentTime + 0.15);
          }, 100);

          setTimeout(() => {
            const osc3 = ctx.createOscillator();
            const gain3 = ctx.createGain();
            osc3.connect(gain3); gain3.connect(ctx.destination);
            osc3.frequency.setValueAtTime(783.99, ctx.currentTime);
            gain3.gain.setValueAtTime(0.12, ctx.currentTime);
            gain3.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
            osc3.start(); osc3.stop(ctx.currentTime + 0.3);
          }, 200);
        } catch(e) {}
      },
      error: () => {
        try {
          const ctx = getAudioContext();
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, now);
          osc.frequency.linearRampToValueAtTime(80, now + 0.28);
          gain.gain.setValueAtTime(0.12, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
          osc.start();
          osc.stop(now + 0.3);
        } catch(e) {}
      },
      rankUnlock: () => {
        try {
          const ctx = getAudioContext();
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(220, now);
          osc.frequency.exponentialRampToValueAtTime(880, now + 0.5);
          gain.gain.setValueAtTime(0.1, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
          osc.start();
          osc.stop(now + 0.6);
        } catch(e) {}
      }
    };

    // ----------------- GEOMETRICAL HELPERS -----------------
    function getCorrespondingId(id) {
      if (id <= 4) return id + 4;
      return id - 4;
    }
    function getAlternateInteriorId(id) {
      const mapping = { 3: 6, 4: 5, 5: 4, 6: 3 };
      return mapping[id] || null;
    }
    function getAlternateExteriorId(id) {
      const mapping = { 1: 8, 2: 7, 7: 2, 8: 1 };
      return mapping[id] || null;
    }
    function getVerticalId(id) {
      const mapping = { 1: 4, 2: 3, 3: 2, 4: 1, 5: 8, 6: 7, 7: 6, 8: 5 };
      return mapping[id];
    }
    function getSupplementaryIds(id) {
      const mapping = {
        1: [2, 3], 2: [1, 4], 3: [1, 4], 4: [2, 3],
        5: [6, 7], 6: [5, 8], 7: [5, 8], 8: [6, 7]
      };
      return mapping[id];
    }

    // Notification Queue
    function addNotification(title, desc) {
      const id = Date.now();
      state.notifications.push({ id, title, desc });
      playSound.rankUnlock();
      renderNotifications();
      setTimeout(() => {
        state.notifications = state.notifications.filter(n => n.id !== id);
        renderNotifications();
      }, 5000);
    }

    // ----------------- DATA DEFINITIONS -----------------
    const missionsData = [
      { id: 1, title: 'Görev 1: Paralel Geçitler (Yöndeş)', codename: 'SEKTÖR Y-9', objectiveText: '3 yöndeş çift bul', description: 'İki paralel doğrunun kesenle yaptığı açılardan aynı yöne bakan (yöndeş) açı çift falan sistemleri uyuşturun.', scoreReward: 200 },
      { id: 2, title: 'Görev 2: Çapraz Koridor (İç Ters)', codename: 'KORİDOR I-1', objectiveText: '2 iç ters çift yerleştir', description: 'Hatların içinde kalan ve kesilme kesitlerine zıt taraflara bakan siber bağlantıları eşleştirin.', scoreReward: 250 },
      { id: 3, title: 'Görev 3: Siber Frekans (Dış Ters)', codename: 'FREKANS D-3', objectiveText: '2 dış ters çift bağla', description: 'Kalkan şebekesindeki dış ters siber frekans bağlantı bölgelerini bulun.', scoreReward: 300 },
      { id: 4, title: 'Görev 4: Siber Tasnif (Yön Değerlendirme)', codename: 'TASNİF T-5', objectiveText: '6/6 tasnif tamamla', description: 'Ekrandaki açı verilerinin hangi kategorilere uyumlu olduğunu sınıflayın.', scoreReward: 350 },
      { id: 5, title: 'Görev 5: Denklemler Şebekesi (Cebir)', codename: 'CEBİR C-8', objectiveText: 'Tüm soruları tamamla', description: 'Eşitlik teorisini kullanarak verilen cebirsel siber kilitleri çözün.', scoreReward: 400 },
      { id: 6, title: 'Görev 6: Siber Kilit (Karışık Sınav)', codename: 'KİLİT K-9', objectiveText: 'Hızlı hacker sınavı', description: 'Bütün teorik hacker eğitimlerini tamamlamak için siber kilit şebekelerini hızla infilak edin.', scoreReward: 500 }
    ];

    const m4Pairs = [
      { p: [1, 5], ans: 'yondes', text: 'Açı 1 ve Açı 5 (İkisi de sol-üst)' },
      { p: [3, 6], ans: 'ic_ters', text: 'Açı 3 ve Açı 6 (İç bölgede ve zıt taraflarında)' },
      { p: [2, 7], ans: 'dis_ters', text: 'Açı 2 ve Açı 7 (Dış bölgede ve zıt taraflarında)' },
      { p: [4, 8], ans: 'yondes', text: 'Açı 4 ve Açı 8 (İkisi de sağ-alt)' }
    ];

    const m5Problems = [
      { q: "Açı 2 = 3x - 10° ve Açı 6 = 2x + 15° ise x kaç derecedir? (Not: Açı 2 ve Açı 6 yöndeştir)", ans: 25, options: [15, 25, 40, 115] },
      { q: "Açı 3 = 110° ise iç tersi olan Açı 6 kaç derecedir?", ans: 110, options: [70, 90, 110, 180] },
      { q: "Açı 1 = 125° ise bütünleri olan Açı 2 kaç derecedir?", ans: 55, options: [45, 55, 125, 180] }
    ];

    const m6Steps = [
      { instruction: 'Açı 1 ile yöndeş olan açıyı seçin', first: 1, second: 5 },
      { instruction: 'Açı 4 ile iç ters olan açıyı seçin', first: 4, second: 5 }
    ];

    // ----------------- RENDER ENGINE -----------------

    // Wedge calculation helper
    function renderWedge(cx, cy, a1, a2, r = 24) {
      const rad1 = (a1 * Math.PI) / 180;
      const rad2 = (a2 * Math.PI) / 180;
      const xs = cx + r * Math.cos(rad1);
      const ys = cy + r * Math.sin(rad1);
      const xe = cx + r * Math.cos(rad2);
      const ye = cy + r * Math.sin(rad2);
      const diff = Math.abs(a2 - a1);
      const sweepFlag = 1;
      const largeArcFlag = diff > 180 ? 1 : 0;
      return "M " + cx + " " + cy + " L " + xs + " " + ys + " A " + r + " " + r + " 0 " + largeArcFlag + " " + sweepFlag + " " + xe + " " + ye + " Z";
    }

    // Main SVG generator
    function getAnglesBoardHtml(transversalAngle, lineDistance = 130, selectedAngleId = null, highlightedAngleIds = [], correctPairIds = [], isLabMode = false) {
      const boardWidth = 540;
      const boardHeight = 385;
      const y1 = 120;
      const y2 = y1 + lineDistance;
      const rad = (transversalAngle * Math.PI) / 180;
      const cx = boardWidth / 2;
      const cy = (y1 + y2) / 2;
      const xAtY = (y) => cx + (y - cy) / Math.tan(rad);
      const x1 = xAtY(y1);
      const x2 = xAtY(y2);

      const phi = transversalAngle;
      const definitions = [
        { idOffset: 0, cx: x1, cy: y1 },
        { idOffset: 4, cx: x2, cy: y2 },
      ];

      const sectors = [];
      definitions.forEach(({ idOffset, cx, cy }) => {
        sectors.push(
          { id: idOffset + 1, cx, cy, a1: 180, a2: 180 + phi, mid: 180 + phi / 2, value: phi },
          { id: idOffset + 2, cx, cy, a1: 180 + phi, a2: 360, mid: (180 + phi + 360) / 2, value: 180 - phi },
          { id: idOffset + 3, cx, cy, a1: phi, a2: 180, mid: (phi + 180) / 2, value: 180 - phi },
          { id: idOffset + 4, cx, cy, a1: 0, a2: phi, mid: phi / 2, value: phi }
        );
      });

      let sectorsHtml = '';
      sectors.forEach(sector => {
        const isSelected = selectedAngleId === sector.id;
        const isHighlighted = highlightedAngleIds.includes(sector.id);
        const isCorrected = correctPairIds.includes(sector.id);

        let strokeCol = 'transparent';
        let fillCol = 'rgba(30, 41, 59, 0.4)';

        if (isSelected) {
          strokeCol = '#22d3ee';
          fillCol = 'rgba(6, 182, 212, 0.28)';
        } else if (isCorrected) {
          strokeCol = '#10b981';
          fillCol = 'rgba(16, 185, 129, 0.3)';
        } else if (isHighlighted) {
          strokeCol = '#f43f5e';
          fillCol = 'rgba(244, 63, 94, 0.25)';
        }

        const textDist = 41;
        const labelRad = (sector.mid * Math.PI) / 180;
        const textX = sector.cx + textDist * Math.cos(labelRad);
        const textY = sector.cy + textDist * Math.sin(labelRad) + 3.5;

        sectorsHtml += `
          <g class="cursor-pointer" onclick="handleWedgeClick(${sector.id})">
            <!-- Wedge Shape -->
            <path
              d="${renderWedge(sector.cx, sector.cy, sector.a1, sector.a2, 30)}"
              fill="${fillCol}"
              stroke="${strokeCol}"
              stroke-width="1.5"
              class="transition-all duration-200 hover:fill-cyan-500/10"
            />
            
            <!-- Interactive Wedge Outer Border ring -->
            <path
              d="${renderWedge(sector.cx, sector.cy, sector.a1, sector.a2, 30.5)}"
              fill="none"
              stroke="${strokeCol}"
              stroke-width="1"
              opacity="0.5"
            />

            <!-- Display Label and Value -->
            <rect
              x="${textX - 16}"
              y="${textY - 9.5}"
              width="32"
              height="19"
              rx="5"
              fill="#030712"
              stroke="${isSelected ? '#22d3ee' : isCorrected ? '#10b981' : isHighlighted ? '#f43f5e' : '#1e293b'}"
              stroke-width="1.2"
              class="opacity-90"
            />
            <text
              x="${textX}"
              y="${textY}"
              fill="${isSelected ? '#22d3ee' : isCorrected ? '#34d399' : isHighlighted ? '#f87171' : '#cbd5e1'}"
              font-size="9"
              font-weight="extrabold"
              font-family="JetBrains Mono"
              text-anchor="middle"
              class="select-none"
            >
              ${sector.id}
            </text>
          </g>
        `;
      });

      return `
        <div class="relative w-full max-w-[540px] aspect-[540/385] rounded-2xl border border-slate-800 bg-slate-950/70 p-1 shadow-2xl overflow-hidden backdrop-blur-md">
          <svg viewBox="0 0 540 385" class="w-full h-full select-none">
            
            <!-- Visual grid background -->
            <defs>
              <pattern id="grid-pattern" width="20" height="20" patternUnits="userSpaceOnUse">
                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e293b" stroke-width="0.5" stroke-opacity="0.4" />
              </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#grid-pattern)" />

            <!-- Grid guidelines -->
            <line x1="0" y1="${y1}" x2="540" y2="${y1}" stroke="#334155" stroke-width="1" stroke-dasharray="3 3" />
            <line x1="0" y1="${y2}" x2="540" y2="${y2}" stroke="#334155" stroke-width="1" stroke-dasharray="3 3" />

            <!-- PARALEL DOĞRULAR d1 ve d2 -->
            <g opacity="0.95">
              <line x1="15" y1="${y1}" x2="525" y2="${y1}" stroke="#06b6d5" stroke-width="4.5" stroke-linecap="round" class="drop-shadow-[0_0_8px_#06b6d5]" />
              <line x1="15" y1="${y2}" x2="525" y2="${y2}" stroke="#3b82f6" stroke-width="4.5" stroke-linecap="round" class="drop-shadow-[0_0_8px_#3b82f6]" />
            </g>

            <!-- KESEN DOĞRU d3 -->
            <g opacity="0.95">
              <line
                x1="${xAtY(-30)}"
                y1="-30"
                x2="${xAtY(415)}"
                y2="415"
                stroke="#ec4899"
                stroke-width="4"
                stroke-linecap="round"
                class="drop-shadow-[0_0_10px_#ec4899]"
              />
            </g>

            <!-- Intersection Nodes (Points d1 and d2) -->
            <circle cx="${x1}" cy="${y1}" r="6.5" fill="#f43f5e" class="animate-pulse" />
            <circle cx="${x2}" cy="${y2}" r="6.5" fill="#10b981" class="animate-pulse" />

            <!-- ANGLES SECTORS GRAPHICS AND INTERACTION -->
            ${sectorsHtml}
          </svg>
        </div>
        
        <div class="flex items-center gap-6 mt-3 px-4 py-2 border border-slate-900 bg-slate-950/40 rounded-xl text-[10px] font-mono text-slate-400">
          <span class="flex items-center gap-1"><span class="w-2.5 h-1.5 bg-[#06b6d5] inline-block rounded-sm"></span> d1 paralel hattı</span>
          <span class="flex items-center gap-1"><span class="w-2.5 h-1.5 bg-[#3b82f6] inline-block rounded-sm"></span> d2 paralel hattı</span>
          <span class="flex items-center gap-1"><span class="w-2.5 h-1 bg-[#ec4899] inline-block rounded-sm"></span> d3 kesen hattı</span>
        </div>
      `;
    }

    // ----------------- USER CLICK & GEOMETRY GAME LOGIC -----------------
    window.handleWedgeClick = function(id) {
      playSound.clickAngle();
      
      if (state.view === 'lab') {
        state.focusedAngleId = id;
        renderRelationsPanel();
        
        // Redraw SVG inside lab panel with highlighting
        const activeYondes = getCorrespondingId(id);
        const activeIcTers = getAlternateInteriorId(id);
        const activeDisTers = getAlternateExteriorId(id);
        const activeTers = getVerticalId(id);
        const highlighted = [activeYondes, activeIcTers, activeDisTers, activeTers].filter(Boolean);

        document.getElementById('board-container').innerHTML = getAnglesBoardHtml(
          state.transversalAngle,
          state.lineDistance,
          id,
          highlighted,
          [],
          true
        );
        return;
      }

      // Mission click flow
      if (state.activeMissionId) {
        if (state.activeMissionId === 4 || state.activeMissionId === 5) {
          state.selectedAngleId = id;
          // Redraw board with highlighted single item
          renderBoardContainer();
          return;
        }

        if (!state.selectedAngleId) {
          state.selectedAngleId = id;
          setFeedback('idle', 'İkinci açıyı seçin...');
          renderBoardContainer();
          return;
        }

        if (state.selectedAngleId === id) {
          state.selectedAngleId = null;
          setFeedback('idle', '');
          renderBoardContainer();
          return;
        }

        // Validate double-click match
        const exists = state.foundPairsList.some(p => (p[0] === state.selectedAngleId && p[1] === id) || (p[0] === id && p[1] === state.selectedAngleId));
        if (exists) {
          setFeedback('error', 'Bu bağlantıyı zaten eşleştirdiniz!');
          state.selectedAngleId = null;
          renderBoardContainer();
          return;
        }

        let isCorrect = false;
        if (state.activeMissionId === 1) isCorrect = getCorrespondingId(state.selectedAngleId) === id;
        else if (state.activeMissionId === 2) isCorrect = getAlternateInteriorId(state.selectedAngleId) === id;
        else if (state.activeMissionId === 3) isCorrect = getAlternateExteriorId(state.selectedAngleId) === id;
        else if (state.activeMissionId === 6) {
          const currentStep = m6Steps[state.m6StepIdx];
          isCorrect = (state.selectedAngleId === currentStep.first && id === currentStep.second) || (state.selectedAngleId === currentStep.second && id === currentStep.first);
        }

        if (isCorrect) {
          playSound.success();
          state.correctPairIds = [state.selectedAngleId, id];
          state.foundPairsList.push([state.selectedAngleId, id]);
          
          const req = state.activeMissionId === 1 ? 3 : state.activeMissionId === 2 ? 2 : state.activeMissionId === 3 ? 2 : 1;
          if (state.foundPairsList.length >= req) {
            setFeedback('success', 'Tebrikler! Geçit bağlantısı stabilize edildi.');
            
            // Advance state
            if (state.activeMissionId === 6) {
              if (state.m6StepIdx + 1 >= m6Steps.length) {
                state.stats.score += 500;
                state.stats.energyCrystals += 120;
                addNotification("Tüm Görevler Tamamlandı", "Hacker rütbesine yetiştiniz!");
                state.activeMissionId = null;
                renderApp();
              } else {
                state.m6StepIdx += 1;
                state.foundPairsList = [];
                state.correctPairIds = [];
                state.selectedAngleId = null;
                setTimeout(() => {
                  setFeedback('idle', 'İkinci adım: ' + m6Steps[state.m6StepIdx].instruction);
                  renderBoardContainer();
                  renderGatewayPanel();
                }, 1500);
              }
            } else {
              const rewarded = missionsData.find(m => m.id === state.activeMissionId).scoreReward;
              state.stats.score += rewarded;
              state.stats.energyCrystals += 50;
              addNotification("Görev Başarılı", "Paralel geçit kilitlerini hacklemeyi başardınız!");
              setTimeout(() => {
                state.activeMissionId = null;
                renderApp();
              }, 1800);
            }
          } else {
            setFeedback('success', 'Eşleşme doğru! Diğer bağlantılara odaklanın.');
            state.selectedAngleId = null;
            renderBoardContainer();
            renderGatewayPanel();
          }
        } else {
          playSound.error();
          setFeedback('error', 'Eşleşme başarısız! Açıların geometrik özelliklerini gözden geçirin.');
          state.selectedAngleId = null;
          renderBoardContainer();
        }
      }
    };

    window.handleM4Answer = function(ans) {
      playSound.clickButton();
      const current = m4Pairs[state.m4Index];
      if (current.ans === ans) {
        playSound.success();
        setFeedback('success', 'Doğru tasnif!');
        setTimeout(() => {
          if (state.m4Index + 1 >= m4Pairs.length) {
            state.stats.score += 350;
            state.stats.energyCrystals += 70;
            addNotification("Görev Tamamlandı", "Veri tasnif matrisi başarıyla uyuşturuldu!");
            state.activeMissionId = null;
            renderApp();
          } else {
            state.m4Index += 1;
            setFeedback('idle', '');
            renderGatewayPanel();
          }
        }, 1100);
      } else {
        playSound.error();
        setFeedback('error', 'Yanlış tasnif! İpucu kılavuzunu inceleyin.');
      }
    };

    window.handleM5Answer = function(ans) {
      playSound.clickButton();
      const current = m5Problems[state.m5Index];
      if (current.ans === ans) {
        playSound.success();
        setFeedback('success', 'Siber kilit doğrulandı!');
        setTimeout(() => {
          if (state.m5Index + 1 >= m5Problems.length) {
            state.stats.score += 400;
            state.stats.energyCrystals += 90;
            addNotification("Şebeke Çözüldü", "Tüm cebirsel denklemler çözüldü!");
            state.activeMissionId = null;
            renderApp();
          } else {
            state.m5Index += 1;
            setFeedback('idle', '');
            renderGatewayPanel();
          }
        }, 1100);
      } else {
        playSound.error();
        setFeedback('error', 'Kilit tepkisiz! Hesaplamayı tekrar kontrol edin.');
      }
    };

      state.activeMissionId = null;
      renderApp();

      playSound.clickButton();
      state.activeMissionId = id;
      state.selectedAngleId = null;
      state.highlightedAngleIds = [];
      state.correctPairIds = [];
      state.foundPairsList = [];
      state.m4Index = 0;
      state.m5Index = 0;
      state.m6StepIdx = 0;
      state.feedback = { status: 'idle', text: '' };
      state.hintOpen = false;
      renderApp();

      state.feedback = { status, text };
      const outNode = document.getElementById('feedback-output');
      if (outNode) {
        if (!text) {
          outNode.innerHTML = '';
          outNode.style.display = 'none';
        } else {
          outNode.style.display = 'block';
          outNode.innerHTML = text;
          outNode.className = "mt-3 p-3 rounded-xl border text-xs leading-relaxed " + 
            (status === 'success' ? 'bg-emerald-950/20 border-emerald-500/30 text-emerald-300' :
             status === 'error' ? 'bg-rose-950/20 border-rose-500/30 text-rose-400' :

      const textHeaderVal = document.getElementById('angle-header-display');
      if (textHeaderVal) textHeaderVal.innerText = 'Açı d3: ' + val + '°';

      const activeDisTers = getAlternateExteriorId(state.focusedAngleId);
      const activeTers = getVerticalId(state.focusedAngleId);

      document.getElementById('board-container').innerHTML = getAnglesBoardHtml(

                            ${state.activeMissionId === 3 ? "Dış ters açılar, iki paralel çizginin dış kısmında kalan ve kesen çizginin zıt yönlerine yönlenen açılardır (örneğin Açı 1 ile Açı 8, veya Açı 2 ile Açı 7). Bu çiftleri birbirine dokundurarak frekansı eşleştir!" : ""}
                            ${state.activeMissionId === 4 ? "Tasnif merkezine veri hatası sızdı! Gösterilen açı çiftlerinin Yöndeş mi, İç Ters mi yoksa Dış Ters mi olduğunu bul ve veri bankasını temizle!" : ""}
                            ${state.activeMissionId === 5 ? "Şebekenin eksik açılarını tamamlamamız gerek! Yöndeş, iç ters veya dış ters açıların kendi aralarındaki eşitlik özelliklerini kullanarak cebirsel soruları yanıtla!" : ""}
                            ${state.activeMissionId === 6 ? "Bu nihai hacker sınavı casus! Sana sırayla yöndeş, iç ters ve dış ters açılar soracağım. Hepsini zamanında ve doğru sırayla birbiri ardına tetikle!" : ""}
                          </p>
                        </div>
                        
                        <div class="space-y-1">
                          <span class="text-[9px] font-mono text-amber-500 font-bold block uppercase tracking-wide">Geometri Kural Seti</span>
                          <p class="text-slate-400 text-[10.5px]">
                            Paralel iki doğrunun bir kesenle yaptığı açılarda: aynı yöne bakan durumlar <strong>Yöndeş</strong>; hatların iç tarafındaki çaprazlar <strong>İç Ters</strong>; hatların dışındaki çaprazlar ise <strong>Dış Ters</strong> olarak adlandırılır. Bu grupların kendi içlerindeki ölçü değerleri birbirine daima eşittir.
                          </p>
                        </div>
                      </div>
                    ` : ''}
                  </div>

                </div>
              </div>
            </div>
          `;
        }
      }

      // Footer
      let footerHtml = `
        <footer class="mt-12 pt-4 border-t border-slate-900 flex flex-col md:flex-row items-center justify-between gap-3 text-[10px] font-mono text-slate-500">
          <span>© ${new Date().getFullYear()} Açı Casusları - Matematik Röntgeni Kampüsü</span>
          <span>Doğru parçalarının kesen lazerlerle uyumu. Çevrimdışı Sürüm</span>
        </footer>

        <!-- Notification container stack -->
        <div id="notification-stack" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-sm"></div>
      `;

      rootNode.innerHTML = headerHtml + viewBodyHtml + footerHtml;

      // Lazy node rendering states
      if (state.view === 'lab') {
        renderRelationsPanel();
      } else if (state.activeMissionId) {
        renderGatewayPanel();
      }
      renderNotifications();
    }

    // Initialize display on window load
    window.onload = function() {
      renderApp();
    };
  </script>
</body>
</html>
