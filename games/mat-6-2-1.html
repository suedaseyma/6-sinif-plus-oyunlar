 */const Gp=[{id:1,title:"Kayıp Sembol: Değişken Tespiti",badgeId:"deve_avci",difficulty:"Kolay",rewardXP:100,narrative:"Kod Ormanı'nın derinliklerinde, Yapay Zekâ Çekirdeği'ne bağlı ilk enerji ağının kabloları kopmuş. Canlı veri ağaçları artık ne kadar enerji ürettiklerini tam takip edemiyor, çünkü sistemde bilinmeyen değerler var! Kâşif Byte olarak ilk işin, bu bilinmeyenleri temsil edecek sihirli sembolleri (değişkenleri) belirlemek.",taskDescription:"Metinlerdeki bilinmeyen durumları fark et, uygun değişkenleri seç ve cebirsel modellerini oluşturarak kayıp bağlantıları kur!",mascotTip:"Bilinmeyen her nicelik (örneğin 'ağaç sayısı' veya 'kristal sayısı') matematikte x, y, n veya k gibi bir küçük harfle yani değişkenle temsil edilir. Bir sayının 7 fazlası demek 'x + 7' demektir!"},{id:2,title:"Veri Bahçesi: Tablo Analizi",badgeId:"tablo_ustasi",difficulty:"Kolay",rewardXP:150,narrative:"Ormanın Veri Bahçesi alanındasın. Buradaki dijital enerji çiçekleri parıldayarak enerji üretiyor. Her bir çiçeğin tam olarak 4 birim enerji ürettiğini biliyoruz! Çiçek sayısıyla üretilen toplam enerji arasında düzenli bir ilişki (örüntü) var. Bu ilişkiyi tablo yardımıyla genelleştirmeliyiz.",taskDescription:"Aşağıdaki tabloda çiçek sayısı arttıkça üretilen enerji artışını takip et. Boş bırakılan hücreleri doldur ve tablodaki ilişkiden yola çıkarak cebirsel genellemeyi keşfet!",mascotTip:"Tabloyu incelediğinde her adımda enerjinin çiçek sayısının tam 4 katı olduğunu göreceksin. Bu ilişki x sayısı için '4 · x' yani '4x' şeklinde formüle edilir!"},{id:3,title:"Kod Ağacı: Cebirsel Modelleme",badgeId:"kod_mimari",difficulty:"Orta",rewardXP:200,narrative:"Bahçenin ötesindeki antik Kod Ağacı'nın yanına geldik. Ağacın köklerinde çalışan mini robotların enerji akışları karışmış durumda. Sistem panelinde robot sayısı ile toplanan enerji gücü arasındaki ilişki listelenmiş. Bu ilişki her adımda belli bir kurala göre büyüyor. Bu kuralı yakalamamız gerek!",taskDescription:"Tablodaki artış miktarını tespit et. Robot sayısı 'n' değişkeni olduğunda toplam enerji gücünü veren genel formülü bul ve kod paneliyle inşa et!",mascotTip:"Adımlar arasındaki artış miktarına dikkat et. Enerji her adımda 5'er artıyor. 1. adımda robot sayısı 1 iken gücümüz 7. Demek ki '5 katından 2 fazla' bir ilişki var: 5n + 2! Kod panelindeki blokları sürükleyerek formülü kur."},{id:4,title:"Enerji Simülatörü: Değişken Değerleri",badgeId:"enerji_muhendisi",difficulty:"Orta",rewardXP:250,narrative:"Kod Ormanı portalının kapısına ulaştın! Jeneratörleri çalıştırıp kapıyı açmak için, bulduğumuz cebirsel ifadelerin farklı koşullardaki gerçek değerlerini hesaplamalıyız. Sistemde yüklü olan formüle (seviye değerine) göre jeneratörün üreteceği enerjiyi hesapla ve enerji çubuğunu doldur!",taskDescription:"Sana sunulan cebirsel ifadelerde değişkenlerin yerine verilen doğal sayı değerlerini koyarak işlem önceliklerine dikkat ederek değer hesapla.",mascotTip:"Eğer formül '3x + 5' ise ve bize 'x = 4' verildiyse; x yerine 4 yazıp çarparız: 3 · 4 = 12, sonra 5 ekleriz: 12 + 5 = 17 enerji olur!"},{id:5,title:"Hikâye Mühendisi: Sözel Durumlar",badgeId:"cebir_sampiyonu",difficulty:"Zor",rewardXP:300,narrative:"Yapay Zeka Çekirdeği, formülleri biliyor ama onların gerçek dünyadaki anlamlarını unutmuş! Eğer bir makineye formülün ne anlama geldiğini sözel olarak öğretemezsek, dijital doğa dengesini kaybedebilir. Cebirsel ifadelerin gerçek hayattaki veya ormandaki bir duruma nasıl karşılık geldiğini tasarlama zamanı!",taskDescription:"Sana verilen cebirsel ifadelere uygun, sürükle-bırak kelime kartlarıyla mantıklı birer gerçek yaşam hikâyesi inşa et.",mascotTip:"Örneğin '4x + 6' ifadesi için; '4' katsayısı her bir nesnenin getirdiği miktarı (çarpım durumunu), '6' ise başlangıçtaki sabit miktarı gösterir. 'Her robot 4 kristal topluyor ve başlangıçta 6 kristal var' seçeneği tam uyar!"},{id:6,title:"Kod Ormanı Merkezi: Final Sınavı",badgeId:"orman_koruyucusu",difficulty:"Zor",rewardXP:400,narrative:"Sonunda Yapa
